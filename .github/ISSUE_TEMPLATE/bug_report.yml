name: Bug report
description: Something broke
labels: [bug]
body:
  - type: textarea
    id: what
    attributes: {label: What happened?, placeholder: Describe the bug}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: What did you expect?}
  - type: textarea
    id: repro
    attributes: {label: Steps to reproduce}
    validations: {required: true}
  - type: input
    id: version
    attributes: {label: Daemon version, description: "`eideticd --version`"}
    validations: {required: true}
  - type: dropdown
    id: os
    attributes: {label: OS, options: [macOS, Linux, Windows]}
    validations: {required: true}
  - type: textarea
    id: logs
    attributes: {label: Logs (optional), render: shell}
